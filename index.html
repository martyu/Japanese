<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Flashcards</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d14;
      --sidebar-bg: #13131f;
      --card-bg:    #1a1a2e;
      --card-bg2:   #1e1e35;
      --accent:     #c084fc;
      --accent2:    #818cf8;
      --border:     #2a2a45;
      --text:       #f0f0ff;
      --muted:      #7474a0;
      --hint:       #3a3a5c;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    /* Toggle pill */
    .toggle-pill {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
    }
    .toggle-pill button {
      padding: 5px 16px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .toggle-pill button.active {
      background: var(--accent);
      color: #0d0d14;
    }

    /* ── Body layout ─────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────── */
    sidebar {
      display: block;
      width: 168px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-label {
      padding: 16px 16px 8px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }

    .batch-item {
      padding: 11px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }
    .batch-item:hover { background: rgba(255,255,255,0.03); }
    .batch-item.active {
      border-left-color: var(--accent);
      background: rgba(192,132,252,0.07);
    }
    .batch-item .b-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
    }
    .batch-item.active .b-name { color: var(--accent); font-weight: 700; }
    .batch-item .b-theme {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .batch-item.active .b-theme { color: #a78bfa; }

    /* ── Card area ───────────────────────────────────────────── */
    .card-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 20px;
    }

    /* Progress */
    .prog-row {
      width: 100%;
      max-width: 500px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .prog-label {
      font-size: 0.75rem;
      color: var(--muted);
      min-width: 64px;
      text-align: right;
    }
    .prog-track {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px;
      transition: width 0.35s ease;
    }

    /* ── Flashcard ───────────────────────────────────────────── */
    .card-wrap {
      width: 100%;
      max-width: 500px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
    }

    .card {
      width: 100%;
      aspect-ratio: 3 / 2;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card.revealed {
      border-color: var(--accent);
      background: var(--card-bg2);
    }

    /* Corner label */
    .c-label {
      position: absolute;
      top: 16px;
      left: 20px;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--hint);
    }

    /* Hint text */
    .c-hint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.68rem;
      color: var(--hint);
      letter-spacing: 0.05em;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── Japanese side ───────────────────────────────────────── */
    .jp-side {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      position: relative;
    }

    .jp-graphic {
      position: absolute;
      font-size: 130px;
      line-height: 1;
      opacity: 0.22;
      pointer-events: none;
      filter: saturate(0.7);
      /* offset slightly right to let kanji breathe on the left */
      transform: translate(8px, 4px);
    }

    .jp-text {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    /* The ruby/kanji */
    ruby {
      font-size: clamp(3rem, 12vw, 5.5rem);
      font-weight: 800;
      color: var(--text);
      line-height: 1.6;
    }
    rt {
      font-size: 0.3em;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── English side ────────────────────────────────────────── */
    .en-side {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 24px 36px;
    }

    .en-text {
      font-size: clamp(1.6rem, 6vw, 2.8rem);
      font-weight: 300;
      color: var(--text);
      text-align: center;
      letter-spacing: -0.01em;
    }


    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 560px) {
      sidebar { width: 120px; }
      .card-area { padding: 20px 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🌸 <span>Nihongo</span> Cards</div>
  <div style="display:flex;align-items:center;gap:12px">
    <input id="api-key-input" type="password" placeholder="Speechify API key"
      style="background:#0d0d14;border:1px solid var(--border);color:var(--text);
             border-radius:8px;padding:5px 10px;font-size:0.8rem;width:200px;outline:none;">
    <div class="toggle-pill">
      <button id="btn-jp" class="active">JP → EN</button>
      <button id="btn-en">EN → JP</button>
    </div>
  </div>
</header>

<div class="layout">

    <div class="sidebar-label">Batches</div>

// ── TTS (OpenAI) ───────────────────────────────────────────────────────────
const apiKeyInput = document.getElementById('api-key-input');

// Persist key in localStorage
const STORAGE_KEY = 'speechify_api_key';
if (localStorage.getItem(STORAGE_KEY)) apiKeyInput.value = localStorage.getItem(STORAGE_KEY);
apiKeyInput.addEventListener('change', () => localStorage.setItem(STORAGE_KEY, apiKeyInput.value.trim()));

let currentAudio = null;
const audioCache = new Map();
let lastPrefetchedBatch = -1;

async function fetchAudioUrl(text, lang) {
  const apiKey = apiKeyInput.value.trim();
  if (!apiKey) return null;
  const res = await fetch('https://api.sws.speechify.com/v1/audio/speech', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      input: text,
      voice_id: lang === 'ja' ? 'mei' : 'lisa',
      model: 'simba-multilingual',
      language: lang === 'ja' ? 'ja-JP' : 'en-US',
      audio_format: 'mp3',
    }),
  });
  if (!res.ok) { console.error('Speechify TTS error:', res.status, await res.text()); return null; }
  return URL.createObjectURL(await res.blob());
}

function playUrl(url) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  currentAudio = new Audio(url);
  currentAudio.play();
}

async function speak(text, lang) {
  const key = lang + ':' + text;
  const cached = audioCache.get(key);
  if (cached) { playUrl(cached); return; }
  const url = await fetchAudioUrl(text, lang);
  if (!url) return;
  audioCache.set(key, url);
  playUrl(url);
}

// Strip display-only punctuation so TTS reads naturally
function ttsText(text) {
  return text
    .replace(/\s*\/\s*/g, ', ')   // "Sun / Day" → "Sun, Day"
    .replace(/\s*&\s*/g, ' and ') // "Sake & Wine" → "Sake and Wine"
    .replace(/\(.*?\)/g, '')      // strip parentheticals
    .trim();
}

const speakJapanese = (text) => speak(text, 'ja');

async function prefetchBatch(batchIdx) {
  if (!apiKeyInput.value.trim()) return;
  if (lastPrefetchedBatch === batchIdx) return;
  lastPrefetchedBatch = batchIdx;
  const words = BATCHES[batchIdx].words;
  await Promise.all(words.flatMap(({ k, en }) => [
    (async () => {
      const key = 'ja:' + k;
      if (audioCache.has(key)) return;
      const url = await fetchAudioUrl(k, 'ja');
      if (url) audioCache.set(key, url);
    })(),
    (async () => {
      const enClean = ttsText(en);
      const key = 'en:' + enClean;
      if (audioCache.has(key)) return;
      const url = await fetchAudioUrl(enClean, 'en');
      if (url) audioCache.set(key, url);
    })(),
  ]));
}

// Kick off prefetch when the API key is saved
apiKeyInput.addEventListener('change', () => {
  localStorage.setItem(STORAGE_KEY, apiKeyInput.value.trim());
  lastPrefetchedBatch = -1; // reset so prefetch re-runs with new key
  prefetchBatch(state.batch);
});

// ── State ──────────────────────────────────────────────────────────────────

  card: 0,
  revealed: false,
  jpFirst: true,
  pointerDown: false,

// ── DOM refs ───────────────────────────────────────────────────────────────

const cardWrap     = document.getElementById('card-wrap');
const progRow      = document.getElementById('prog-row');
const progLabel    = document.getElementById('prog-label');
const progFill     = document.getElementById('prog-fill');
const btnJP        = document.getElementById('btn-jp');
const btnEN        = document.getElementById('btn-en');

// ── Build sidebar ──────────────────────────────────────────────────────────
function buildSidebar() {
  batchListEl.innerHTML = '';
  BATCHES.forEach((b, i) => {
    const el = document.createElement('div');
    el.className = 'batch-item' + (i === state.batch ? ' active' : '');
    el.innerHTML = `<div class="b-name">${b.name}</div><div class="b-theme">${b.theme}</div>`;
    el.addEventListener('click', () => {
      state.batch = i;
      state.card = 0;
      state.revealed = false;
      buildSidebar();
      render();
      prefetchBatch(i);
    });
    batchListEl.appendChild(el);
  });
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const batch = BATCHES[state.batch];
  const words = batch.words;

  if (state.card >= words.length) state.card = 0;

  const word = words[state.card];
  const total = words.length;

  // Progress
  progRow.style.visibility = 'visible';
  progLabel.textContent = `${state.card + 1} / ${total}`;
  progFill.style.width = `${(state.card / total) * 100}%`;

  // What language is currently on screen?
  // jpFirst=T revealed=F → Japanese  |  jpFirst=T revealed=T → English
  // jpFirst=F revealed=F → English   |  jpFirst=F revealed=T → Japanese
  const showingJP = state.jpFirst !== state.revealed;

  const hint = state.revealed ? 'release → next card' : 'press to reveal';
  const label = showingJP ? 'Japanese' : 'English';

  let inner;
  if (showingJP) {
    inner = `
      <div class="jp-side">
        <div class="jp-text">
          ${word.r ? `<ruby>${word.k}<rt>${word.r}</rt></ruby>` : `<span>${word.k}</span>`}
        </div>
      </div>`;
  } else {
    inner = `<div class="en-side"><span class="en-text">${word.en}</span></div>`;
  }

  cardWrap.innerHTML = `
    <div class="card${state.revealed ? ' revealed' : ''}">
      <span class="c-label">${label}</span>
      ${inner}
      <span class="c-hint">${hint}</span>
    </div>`;

  if (showingJP) speak(word.k, 'ja');
  else speak(ttsText(word.en), 'en');
}

// ── Pointer interaction ────────────────────────────────────────────────────
cardWrap.addEventListener('pointerdown', e => {
  // ignore right-click
  if (e.button !== undefined && e.button !== 0) return;
  if (state.card >= BATCHES[state.batch].words.length) return;
  state.pointerDown = true;
  if (!state.revealed) {
    state.revealed = true;
    render();
  }
});

document.addEventListener('pointerup', () => {
  if (!state.pointerDown) return;
  state.pointerDown = false;
  if (state.card >= BATCHES[state.batch].words.length) return;
  if (state.revealed) {
    state.card++;
    state.revealed = false;
    render();
  }
});

document.addEventListener('pointercancel', () => {
  state.pointerDown = false;
});

// ── Language toggle ────────────────────────────────────────────────────────
btnJP.addEventListener('click', () => {
  if (state.jpFirst) return;
  state.jpFirst = true;
  state.revealed = false;
  btnJP.classList.add('active');
  btnEN.classList.remove('active');
  render();
});

btnEN.addEventListener('click', () => {
  if (!state.jpFirst) return;
  state.jpFirst = false;
  state.revealed = false;
  btnEN.classList.add('active');
  btnJP.classList.remove('active');
  render();
});

// ── Init ───────────────────────────────────────────────────────────────────
buildSidebar();
render();
prefetchBatch(state.batch);
</script>
</body>
</html>
